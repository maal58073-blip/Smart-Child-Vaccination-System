<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الكتيب الإلكتروني الرسمي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @media print {
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
            .official-header { display: block !important; text-align: center; border-bottom: 2px solid #000; padding: 10px; margin-bottom: 20px; }
            h2.mom-greeting { display: none !important; }
        }
        .official-header { display: none; }
        .status-done { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <header class="top-header no-print">
        <h1>منظومة التطعيمات</h1>
        <nav><a href="booking.html">حجز موعد</a></nav>
    </header>

    <div class="container">
        <div class="card">
            <h2 class="mom-greeting">مرحباً بكِ يا أمي 🌸</h2>
            <button id="addChildBtn" class="btn no-print" style="background:#10b981;">إضافة طفل جديد (اسم ثلاثي)</button>
            <div id="childrenList"></div>
        </div>
    </div>

    <script>
        let children = JSON.parse(localStorage.getItem('vaccine_children')) || [];
        let bookings = JSON.parse(localStorage.getItem('sysBookings')) || [];

        function render() {
            const list = document.getElementById('childrenList');
            list.innerHTML = '';
            children.forEach((child, index) => {
                const childBookings = bookings.filter(b => b.child === child.name);
                const sectionId = `child-${index}`;
                list.innerHTML += `
                    <div class="child-card print-area" id="${sectionId}" style="border:1px solid #ddd; padding:20px; margin-top:20px; border-radius:10px;">
                        <div class="official-header">
                            <h3>دولة ليبيا - وزارة الصحة</h3>
                            <h4>كتيب التطعيم الإلكتروني الرسمي</h4>
                            <p>تاريخ الاستخراج: ${new Date().toLocaleDateString('ar-LY')}</p>
                        </div>
                        <h3>الطفل: ${child.name}</h3>
                        <p>تاريخ الميلاد: ${child.birthDate}</p>
                        <table border="1" style="width:100%; border-collapse:collapse;">
                            <thead><tr><th>التطعيم</th><th>المركز</th><th>التاريخ</th><th>الحالة</th></tr></thead>
                            <tbody>
                                <tr><td>تطعيم الولادة</td><td>المركز الرئيسي</td><td>${child.birthDate}</td><td>تم الأخذ</td></tr>
                                ${childBookings.map(b => `<tr><td>${b.vaccine}</td><td>${b.center}</td><td>${b.date}</td><td>${b.taken?'✅':'⏳'}</td></tr>`).join('')}
                            </tbody>
                        </table>
                        <button onclick="printChild('${sectionId}')" class="btn-small no-print" style="margin-top:10px; background:#4f46e5; color:white; cursor:pointer; padding:5px 10px;">تحميل الكتيب PDF (هذا الطفل فقط)</button>
                    </div>`;
            });
        }

        document.getElementById('addChildBtn').addEventListener('click', () => {
            const name = prompt("أدخلي الاسم الثلاثي للطفل:");
            if(!name || name.trim().split(/\s+/).length < 3) return alert("خطأ: يجب إدخال اسم ثلاثي!");
            
            const dob = prompt("أدخلي تاريخ الميلاد (YYYY-MM-DD):");
            if(new Date(dob) > new Date()) return alert("خطأ: التاريخ في المستقبل!");

            children.push({name, birthDate: dob});
            localStorage.setItem('vaccine_children', JSON.stringify(children));
            render();
        });

        window.printChild = (id) => {
            const all = document.querySelectorAll('.print-area');
            all.forEach(s => s.classList.add('no-print'));
            document.getElementById(id).classList.remove('no-print');
            window.print();
            all.forEach(s => s.classList.remove('no-print'));
        };

        render();
    </script>
</body>
</html>
