<div class="add-child-section no-print">
    <h2 class="welcome-msg">مرحباً بكِ يا أمي 🌸</h2>
    <p style="color: #64748b; margin-bottom: 20px;">أدخلي بيانات طفلكِ لإنشاء الكتيب الإلكتروني:</p>
    
    <div id="addChildForm" style="display: block; text-align: right; max-width: 400px; margin: 0 auto;">
        <div class="form-group-custom" style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">الاسم الثلاثي للطفل:</label>
            <input type="text" id="newChildName" placeholder="مثال: محمد أحمد علي" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;">
        </div>
        
        <div class="form-group-custom" style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">تاريخ الميلاد:</label>
            <input type="date" id="birthDate" max="2026-12-31" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px;">
        </div>
        
        <button class="btn" onclick="saveNewChild()" style="width: 100%; background-color: #10b981;">
            <i class="fa-solid fa-save"></i> حفظ بيانات الطفل وإنشاء الكتيب
        </button>
    </div>
</div>
