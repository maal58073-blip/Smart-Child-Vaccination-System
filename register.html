<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حساب جديد - منظومة التطعيمات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="register.html" class="active">تسجيل حساب</a>
        <a href="login.html">دخول</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>حساب جديد لولي الأمر <i class="fa-solid fa-id-card"></i></h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>الاسم الكامل (للأم):</label>
                    <input type="text" id="regName" placeholder="الاسم الثلاثي" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني:</label>
                    <input type="email" id="regEmail" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label>تاريخ ميلاد الطفل:</label>
                    <input type="date" id="dob" required>
                    <small style="color:red; display:none;" id="dateError">خطأ: لا يمكن اختيار تاريخ في المستقبل!</small>
                </div>
                <div class="form-group">
                    <label>كلمة المرور:</label>
                    <div class="password-wrapper">
                        <input type="password" id="regPassword" required>
                        <i class="fa-solid fa-eye-slash toggle-password" onclick="togglePassword('regPassword', this)"></i>
                    </div>
                </div>
                <button type="submit" class="btn">إنشاء الحساب</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // قفل التاريخ فور تحميل الصفحة
        const dobInput = document.getElementById('dob');
        const today = new Date().toISOString().split('T')[0];
        dobInput.setAttribute('max', today);

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            if (dobInput.value > today) {
                e.preventDefault();
                document.getElementById('dateError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
