<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة - صغارنا</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* إخفاء المحتوى تماماً حتى يتم التأكد من كلمة المرور */
        #adminContent { display: none; }
        .stat-card { padding: 20px; border-radius: 15px; flex: 1; min-width: 150px; text-align: center; color: #1e293b; }
    </style>
</head>
<body onload="checkAdminAuth()">
    
    <div id="adminContent">
        <header class="top-header">
            <h1>لوحة تحكم المشرف <i class="fa-solid fa-user-gear"></i></h1>
            <p>إدارة منظومة صغارنا - بنغازي 2026</p>
        </header>

        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="dashboard.html">الكتيب الإلكتروني</a>
            <a href="booking.html">الحجوزات</a>
            <a href="#" onclick="logoutAdmin()" style="color: #ef4444;">تسجيل خروج</a>
        </nav>

        <div class="container">
            <div class="card" style="max-width: 800px;">
                <h2>📊 إحصائيات النظام الحالية</h2>
                <div style="display: flex; gap: 20px; margin-top: 20px; justify-content: center; flex-wrap: wrap;">
                    <div class="stat-card" style="background: #e0e7ff;">
                        <h3 id="childCount">0</h3>
                        <p>إجمالي الأطفال المسجلين</p>
                    </div>
                    <div class="stat-card" style="background: #dcfce7;">
                        <h3 id="bookingCount">0</h3>
                        <p>تطعيمات تم إنجازها</p>
                    </div>
                </div>

                <h3 style="margin-top: 30px; text-align: right;">🔧 إجراءات المشرف</h3>
                <button class="btn" onclick="sendAlert()" style="background: var(--primary); margin-top: 10px;">إرسال تنبيهات جماعية للأمهات 🔔</button>
                <button class="btn" onclick="clearSystemData()" style="background: #ef4444; margin-top: 10px;">تصفير كافة بيانات النظام</button>
            </div>
        </div>

        <footer>
            <p>جميع الحقوق محفوظة &copy; 2026 - لوحة تحكم الإدارة</p>
        </footer>
    </div>

    <script>
        // 1. وظيفة الحماية بكلمة مرور (النقطة الرابعة)
        function checkAdminAuth() {
            const pass = prompt("أدخلي كلمة مرور المشرف للدخول:");
            if (pass === "admin2026") { // يمكنكِ تغيير الكلمة هنا
                document.getElementById('adminContent').style.display = 'block';
                loadStats();
            } else {
                alert("عذراً، كلمة المرور خاطئة. سيتم توجيهك للرئيسية.");
                window.location.href = "index.html";
            }
        }

        // 2. جلب الإحصائيات الحقيقية من الـ LocalStorage
        function loadStats() {
            const children = JSON.parse(localStorage.getItem('children')) || [];
            document.getElementById('childCount').innerText = children.length;
            
            // حساب التطعيمات المنجزة
            let doneCount = 0;
            children.forEach(child => {
                child.vaccinations.forEach(v => {
                    if (v.status === "تم أخذها") doneCount++;
                });
            });
            document.getElementById('bookingCount').innerText = doneCount;
        }

        function sendAlert() {
            alert("جاري الاتصال بخادم الرسائل... تم إرسال 45 تنبيه لمواعيد غداً بنجاح! ✅");
        }

        function clearSystemData() {
            if(confirm("تحذير: سيتم مسح كافة بيانات الأطفال والحجوزات نهائياً. هل أنتِ متأكدة؟")) {
                localStorage.clear();
                alert("تم تصفير النظام.");
                location.reload();
            }
        }

        function logoutAdmin() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
