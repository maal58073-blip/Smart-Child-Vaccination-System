<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حجز موعد - منظومة التطعيمات</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="booking.html" class="active">حجز موعد</a>
            <a href="dashboard.html">الكتيب الإلكتروني</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>حجز موعد تطعيم</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>اسم الطفل:</label>
                    <select id="childSelect" required></select>
                </div>
                <div class="form-group">
                    <label>المركز الصحي:</label>
                    <select id="centerSelect" required onchange="updateVaccines()"></select>
                </div>
                <div class="table-responsive">
                    <table class="vaccine-table">
                        <thead>
                            <tr><th>اختيار</th><th>التطعيم</th><th>التاريخ</th><th>الأماكن</th></tr>
                        </thead>
                        <tbody id="appointmentsList"></tbody>
                    </table>
                </div>
                <button type="submit" class="btn">تأكيد الحجز</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // بيانات المراكز (التغيير الديناميكي)
        const centerData = {
            "الفويهات": [{id:1, v:"شلل الأطفال", d:"2026-05-10", s:5}],
            "الكيش": [{id:2, v:"الثلاثي الفيروسي", d:"2026-05-15", s:3}],
            "الماجوري": [{id:3, v:"التهاب الكبد", d:"2026-05-20", s:10}]
        };

        function populateCenters() {
            const select = document.getElementById('centerSelect');
            select.innerHTML = '<option value="">-- اختر المركز --</option>';
            for(let center in centerData) {
                select.innerHTML += `<option value="${center}">${center}</option>`;
            }
        }

        function updateVaccines() {
            const center = document.getElementById('centerSelect').value;
            const tbody = document.getElementById('appointmentsList');
            tbody.innerHTML = '';
            if(centerData[center]) {
                centerData[center].forEach(app => {
                    tbody.innerHTML += `
                        <tr>
                            <td><input type="radio" name="app" value="${app.id}" data-v="${app.v}" data-d="${app.d}" required></td>
                            <td>${app.v}</td><td>${app.d}</td><td>${app.s}</td>
                        </tr>`;
                });
            }
        }

        // جلب الأطفال من الذاكرة
        const children = JSON.parse(localStorage.getItem('vaccine_children')) || [];
        const cSelect = document.getElementById('childSelect');
        children.forEach(c => cSelect.innerHTML += `<option value="${c.name}">${c.name}</option>`);

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const radio = document.querySelector('input[name="app"]:checked');
            const newBooking = {
                child: cSelect.value,
                vaccine: radio.getAttribute('data-v'),
                date: radio.getAttribute('data-d'),
                center: document.getElementById('centerSelect').value,
                taken: false
            };
            let bookings = JSON.parse(localStorage.getItem('sysBookings')) || [];
            bookings.push(newBooking);
            localStorage.setItem('sysBookings', JSON.stringify(bookings));
            alert("تم الحجز بنجاح!");
            window.location.href = "dashboard.html";
        });

        populateCenters();
    </script>
</body>
</html>
